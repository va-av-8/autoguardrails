# Guardrail Reference: govtech/stsb-roberta-base-off-topic
# arxiv.org/abs/2411.12946 (Chua et al., 2024)
#
# ВАЖНО: это НЕ SOTA по метрикам.
# Роль: reference по постановке — off-topic guardrail для LLM,
# та же framing что у нас. Включаем для методологического сравнения.
#
# Ограничения:
# - Обучена на синтетических данных, не на CLINC150
# - Нет peer-reviewed чисел на наших метриках
# - Требует system_prompt (описание мандата агента)

model: guardrail_reference
hf_model: govtech/stsb-roberta-base-off-topic

system_prompt: >
  A task-oriented dialogue system that handles 150 intents across
  10 domains: travel, utility, work, small talk, meta, banking,
  home, auto, kitchen, and credit cards.

device: cpu

evaluation:
  # Основные метрики — прямое сравнение с OOS-литературой
  primary_metrics:
    - oos_recall      # TPR на OOS; ADB, DETER, AutoIntent
    - in_domain_acc   # accuracy на in-scope; AutoIntent Table 3: 96.13
    - f1_oos          # F1 на OOS; AutoIntent Table 3: 76.79
  # Вспомогательные
  secondary_metrics:
    - auroc           # EMNLP Industry 2024
    - au_ioc          # Springer Applied Intelligence 2024; guardrail trade-off
    - latency_ms      # guardrail-аргументация
  note: >
    Числа несравнимы с основными моделями напрямую —
    модель обучена на другом распределении (синтетические данные).
    is_reference=true в EvaluationResult.
