# DA-ADB: Distance-Aware Adaptive Decision Boundary
# SOTA метод для OOS-детекции (Zhang et al., AAAI 2021 + IEEE TASLP 2023)
# Верхняя граница качества для сравнения с AutoIntent
#
# Статьи:
# - ADB (AAAI 2021): Deep Open Intent Classification with Adaptive Decision Boundary
# - DA-ADB (IEEE TASLP 2023): Learning Discriminative Representations and Decision
#   Boundaries for Open Intent Detection (arXiv:2203.05823)
#
# Репозиторий: https://github.com/thuiar/Adaptive-Decision-Boundary

model: dadb

encoder:
  # DA-ADB использует BERT + дообучение на in-scope данных
  model_name: bert-base-uncased
  pooling: cls                  # [CLS] token как представление
  finetune: true                # дообучение на train-сплите

training:
  epochs: 10
  batch_size: 32
  learning_rate: 2e-5
  warmup_ratio: 0.1

adb:
  # Adaptive Decision Boundary — ключевая идея метода
  # Граница адаптируется под плотность каждого intent-кластера
  boundary_type: adaptive       # vs fixed (baseline)
  temperature: 0.05             # temperature scaling для softmax

oos_detection:
  # DA-ADB использует Mahalanobis distance до центроидов
  distance_metric: mahalanobis
  # Порог подбирается на validation set
  threshold_method: validation_tune

# Ожидаемые результаты на CLINC150 (из статьи DA-ADB):
# - OOS F1 (hard): ~85-88%
# - OOS recall (hard): ~80-85%
# Примечание: результаты на full train, не few-shot

evaluation:
  primary_metric: recall_at_fpr
  fpr_targets: [0.05, 0.10]
  secondary_metrics: [accuracy, auroc, f1_oos, latency_ms]
