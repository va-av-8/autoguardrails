# AutoIntent на полном train-сплите
# Воспроизведение результата из статьи: OOS F1 = 76.79 на CLINC150
# Служит верхней границей качества AutoIntent и проверкой воспроизводимости

model: autointent
mode: full

autointent:
  preset: classic-light         # тот же preset, что и в few-shot
  # для fair comparison используем одинаковые гиперпараметры

oos_detection:
  decision_module: tunable      # автоматический подбор порога

# Ожидаемые результаты из статьи AutoIntent (Table 3):
# - in-domain accuracy: 96.13
# - OOS F1: 76.79
# - OOS recall: не указан
# - OOS precision: не указан
# Примечание: сплит OOS (easy/medium/hard) в статье не уточнён

evaluation:
  # Основные метрики — прямое сравнение с OOS-литературой
  primary_metrics:
    - oos_recall      # TPR на OOS; ADB, DETER, AutoIntent
    - in_domain_acc   # accuracy на in-scope; AutoIntent Table 3: 96.13
    - f1_oos          # F1 на OOS; AutoIntent Table 3: 76.79
  # Вспомогательные
  secondary_metrics:
    - auroc           # EMNLP Industry 2024
    - au_ioc          # Springer Applied Intelligence 2024; guardrail trade-off
    - latency_ms      # guardrail-аргументация

reproducibility:
  # параметры для точного воспроизведения результата из статьи
  seed: 42
  log_config: true              # сохранить финальный конфиг в results/
