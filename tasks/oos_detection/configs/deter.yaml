# SOTA: DETER — Dual Encoder for Threshold-Based Re-Classification
# arxiv.org/abs/2405.19967 (2024)
# GitHub: github.com/Hossam-Mohammed-tech/Intent_Classification_OOS
#
# Роль: SOTA (верхняя граница качества)
# Метрики на CLINC150 vs ADB: +13% F1 known, +5% F1 unknown

model: deter

deter:
  repo_path: external/deter          # git clone сюда
  device: cpu                        # или cuda

evaluation:
  # Основные метрики — прямое сравнение с OOS-литературой
  primary_metrics:
    - oos_recall      # TPR на OOS; ADB, DETER, AutoIntent
    - in_domain_acc   # accuracy на in-scope; AutoIntent Table 3: 96.13
    - f1_oos          # F1 на OOS; AutoIntent Table 3: 76.79
  # Вспомогательные
  secondary_metrics:
    - auroc           # EMNLP Industry 2024
    - au_ioc          # Springer Applied Intelligence 2024; guardrail trade-off
    - latency_ms      # guardrail-аргументация
