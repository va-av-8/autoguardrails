search_space:
  - node_type: scoring
    target_metric: scoring_f1
    search_space:
      - module_name: knn
        k:
          low: 1
          high: 20
        weights: [uniform, distance, closest]
      - module_name: linear
      - module_name: mlknn
        k:
          low: 1
          high: 20
  - node_type: decision
    target_metric: oos_f1
    search_space:
      - module_name: threshold
        thresh:
          low: 0.1
          high: 0.9
      - module_name: argmax
      - module_name: jinoos
      - module_name: tunable
      - module_name: adaptive
hpo_config:
  sampler: tpe
  n_trials: 20
  n_startup_trials: 10
embedder_config:
  model_name: intfloat/multilingual-e5-large-instruct