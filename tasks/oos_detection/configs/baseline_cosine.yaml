# Бейзлайн B: Cosine Similarity Threshold
# OOS детектируется через порог косинусного расстояния до ближайшего кластера
# Простой embedding-based подход без обучения классификатора

model: embedding_threshold
oos_handling: threshold   # OOS = запрос далеко от всех известных интентов

embedding:
  model_name: sentence-transformers/all-mpnet-base-v2
  # та же модель, что используется в AutoIntent по умолчанию
  # для fair comparison бейзлайна с AutoIntent

threshold:
  method: percentile      # порог как перцентиль расстояний на train
  percentile: 95          # 95% train-примеров ближе порога
  # альтернатива: method: fixed, value: 0.7

similarity:
  metric: cosine
  aggregation: max        # max sim до любого примера из train
  # альтернатива: aggregation: centroid — sim до центроида кластера

evaluation:
  primary_metric: recall_at_fpr
  fpr_targets: [0.05, 0.10]
  secondary_metrics: [accuracy, auroc, f1_oos, latency_ms]
