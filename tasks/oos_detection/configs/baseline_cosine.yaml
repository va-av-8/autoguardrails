# Бейзлайн B: Cosine Similarity + Threshold
# Два варианта модели, запускаются одним скриптом через --model_name

model: embedding_threshold

variants:
  - model_name: bert-base-uncased
    # Связь с литературой: используется в ADB (AAAI 2021), DCLOOS (ACL 2021)
    # Нижняя граница среди embedding-методов — модель не оптимизирована
    # под semantic similarity

  - model_name: sentence-transformers/all-MiniLM-L6-v2
    # Дообучена на semantic similarity — даёт лучше zero-shot качество
    # Используется для сравнения внутри бейзлайна

threshold: 0.85                      # начальное значение, подбирается по val
batch_size: 32
device: cpu

evaluation:
  # Основные метрики — прямое сравнение с OOS-литературой
  primary_metrics:
    - oos_recall      # TPR на OOS; ADB, DETER, AutoIntent
    - in_domain_acc   # accuracy на in-scope; AutoIntent Table 3: 96.13
    - f1_oos          # F1 на OOS; AutoIntent Table 3: 76.79
  # Вспомогательные
  secondary_metrics:
    - auroc           # EMNLP Industry 2024
    - au_ioc          # Springer Applied Intelligence 2024; guardrail trade-off
    - latency_ms      # guardrail-аргументация
